// Ubuntu Touch port — touch/xonotic.cfg (tracked in this repo)
// Resolution/DPI: touch/screen-calc.sh → docs/SCREEN.md
// Control presets: touch/profiles/*.cfg at launch → docs/CONTROLS.md
// Default chain: xonotic.cfg → screen.layout.cfg → standard.cfg → balanced.cfg → ~/.xonotic/touch.layout.cfg

sensitivity 3.5
m_pitch 0.022
m_yaw 0.022
vid_fullscreen 1
vid_touchscreen 1
cl_movement 1
cl_movement_maxspeed 320
cl_movement_jumpvelocity 270
cl_curl_enabled 0
r_shadow_realtime_world 0
r_shadow_realtime_dlight 0
r_bloom 0
r_motionblur 0
gl_texturecompression 1
r_picmipworld 1
r_picmipsprites 1
r_drawviewmodel 1
scr_sshot_jpeg 0
con_closeontoggle 1

// Mobile FPS HUD replaces overlapping default panels on touch
touch_mobile_hud 1
seta hud_panel_healtharmor 0
seta hud_panel_ammo 0
seta hud_panel_weapons 0
