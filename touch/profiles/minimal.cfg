// touch/profiles/minimal.cfg — Small phones: 3 weapons, fewer buttons
// Crouch / zoom / dodge in "more" panel (touch_minimal_more — CSQC)

touch_preset "minimal"
touch_handedness 0

touch_scale 1.05
touch_opacity 0.70
touch_move_x 0.13
touch_move_y 0.73
touch_move_size 0.17
touch_fire_x 0.87
touch_fire_y 0.73
touch_fire_size 0.15
touch_jump_x 0.74
touch_jump_y 0.83
touch_jump_size 0.12
touch_crouch_x 0.0
touch_crouch_y 0.0
touch_crouch_size 0.10
touch_weapon_x 0.58
touch_weapon_y 0.83
touch_weapon_size 0.12
touch_zoom_x 0.0
touch_zoom_y 0.0
touch_zoom_size 0.10
touch_dodge_x 0.0
touch_dodge_y 0.0
touch_dodge_size 0.10
touch_dodge_visible 0
touch_look_zone_left 0.40
touch_look_zone_right 1.0
touch_edge_deadzone_px 20

touch_sens_base 3.2
touch_sens_y_mult 1.0
touch_invert_y 0
touch_look_smoothing 1
touch_look_deadzone_px 10
touch_stick_deadzone 0.16
touch_stick_range 1.0
touch_aim_assist 1

touch_fire_mode 0
touch_zoom_mode 0
touch_weapon_mode 1
touch_weapon_slot1 "Laser"
touch_weapon_slot2 "Shotgun"
touch_weapon_slot3 "Grenade Launcher"
touch_auto_fire 0
touch_dodge_mode 0
touch_scoreboard_gesture 1
touch_chat_mode 1

sensitivity 3.2
m_pitch 0.022
m_yaw 0.022

touch_hud_scale 1.05
touch_minimal_more 1
