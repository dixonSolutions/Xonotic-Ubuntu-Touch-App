// touch/profiles/balanced.cfg — Performance only (default thermal target)
// Matches touch/xonotic.cfg graphics baseline

touch_performance_profile "balanced"

fps_max 60
r_picmipworld 1
r_picmipsprites 1
r_shadow_realtime_world 0
r_shadow_realtime_dlight 0
r_bloom 0
r_motionblur 0
gl_texturecompression 1
r_particles 1
