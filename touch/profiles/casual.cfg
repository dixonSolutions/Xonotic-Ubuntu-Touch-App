// touch/profiles/casual.cfg — New players: larger targets, light aim assist
// Based on standard.cfg with relaxed feel

touch_preset "casual"
touch_handedness 0

touch_scale 1.15
touch_opacity 0.75
touch_move_x 0.11
touch_move_y 0.70
touch_move_size 0.20
touch_fire_x 0.86
touch_fire_y 0.70
touch_fire_size 0.16
touch_jump_x 0.70
touch_jump_y 0.80
touch_jump_size 0.13
touch_crouch_x 0.58
touch_crouch_y 0.80
touch_crouch_size 0.12
touch_weapon_x 0.48
touch_weapon_y 0.80
touch_weapon_size 0.12
touch_zoom_x 0.38
touch_zoom_y 0.80
touch_zoom_size 0.11
touch_dodge_x 0.11
touch_dodge_y 0.56
touch_dodge_size 0.12
touch_dodge_visible 1
touch_look_zone_left 0.42
touch_look_zone_right 1.0
touch_edge_deadzone_px 18

touch_sens_base 2.8
touch_sens_y_mult 0.9
touch_invert_y 0
touch_look_smoothing 2
touch_look_deadzone_px 12
touch_stick_deadzone 0.18
touch_stick_range 1.0
touch_aim_assist 1

touch_fire_mode 0
touch_zoom_mode 0
touch_weapon_mode 0
touch_auto_fire 0
touch_dodge_mode 0
touch_scoreboard_gesture 1
touch_chat_mode 1

sensitivity 2.8
m_pitch 0.020
m_yaw 0.022

touch_hud_scale 1.1
