// touch/profiles/quality.cfg — Performance only (plugged in / cool device)
// Higher fidelity where thermals allow

touch_performance_profile "quality"

fps_max 0
r_picmipworld 0
r_picmipsprites 0
r_shadow_realtime_world 1
r_shadow_realtime_dlight 1
r_bloom 1
r_motionblur 0
gl_texturecompression 0
r_particles 1
