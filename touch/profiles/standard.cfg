// touch/profiles/standard.cfg — Arena two-thumb (default)
// Layout + feel. See docs/CONTROLS.md

touch_preset "standard"
touch_handedness 0

// --- Layout (normalized screen fractions) ---
touch_scale 1.0
touch_opacity 0.65
touch_move_x 0.12
touch_move_y 0.72
touch_move_size 0.18
touch_fire_x 0.88
touch_fire_y 0.72
touch_fire_size 0.14
touch_jump_x 0.72
touch_jump_y 0.82
touch_jump_size 0.11
touch_crouch_x 0.62
touch_crouch_y 0.82
touch_crouch_size 0.10
touch_weapon_x 0.52
touch_weapon_y 0.82
touch_weapon_size 0.11
touch_zoom_x 0.42
touch_zoom_y 0.82
touch_zoom_size 0.10
touch_dodge_x 0.12
touch_dodge_y 0.58
touch_dodge_size 0.10
touch_dodge_visible 1
touch_look_zone_left 0.45
touch_look_zone_right 1.0
touch_edge_deadzone_px 16

// --- Feel ---
touch_sens_base 3.5
touch_sens_y_mult 1.0
touch_invert_y 0
touch_look_smoothing 1
touch_look_deadzone_px 8
touch_stick_deadzone 0.15
touch_stick_range 1.0
touch_aim_assist 0

// --- Behavior ---
touch_fire_mode 0
touch_zoom_mode 0
touch_weapon_mode 0
touch_auto_fire 0
touch_dodge_mode 0
touch_scoreboard_gesture 1
touch_chat_mode 1

// Engine look (CSQC overwrites from touch_sens_* using DPI)
sensitivity 3.5
m_pitch 0.022
m_yaw 0.022

// HUD
touch_hud_scale 1.0
