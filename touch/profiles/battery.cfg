// touch/profiles/battery.cfg — Performance only (stack after a layout preset)
// Lower FPS cap, aggressive picmip, minimal effects

touch_performance_profile "battery"

fps_max 30
r_picmipworld 2
r_picmipsprites 2
r_shadow_realtime_world 0
r_shadow_realtime_dlight 0
r_bloom 0
r_motionblur 0
gl_texturecompression 1
r_particles 0
