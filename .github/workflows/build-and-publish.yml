name: Build and publish

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FLATPAK_APP_ID: io.github.dixonSolutions.XonoticTouch
  FLATPAK_REMOTE_NAME: xonotic-touch
  FLATPAK_REMOTE_URL: https://dixonSolutions.github.io/Xonotic-Ubuntu-Touch-App/flatpak

jobs:
  flatpak:
    name: Flatpak (${{ matrix.arch }})
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Docker for QEMU
        if: matrix.arch != 'x86_64'
        run: |
          curl -fsSL https://download.docker.com/linux/static/stable/x86_64/docker-26.0.0.tgz \
            --output ./docker.tgz
          tar xzf docker.tgz
          mv docker/* /usr/bin

      - name: Set up QEMU
        if: matrix.arch != 'x86_64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: XonoticTouch-${{ matrix.arch }}.flatpak
          manifest-path: flatpak/io.github.dixonSolutions.XonoticTouch.yml
          arch: ${{ matrix.arch }}
          cache-key: flatpak-${{ matrix.arch }}

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-${{ matrix.arch }}
          path: XonoticTouch-${{ matrix.arch }}.flatpak

  click-arm64:
    name: Click (arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Click package
        uses: tuxecure/clickable@v2
        env:
          XONOTIC_PACKAGE_BUILD: '1'
        with:
          image: clickable/ci-20.04-arm64
          run: clickable build --arch arm64 --skip-review

      - name: Upload Click package
        uses: actions/upload-artifact@v4
        with:
          name: click-arm64
          path: build/*/app/*.click

  publish-flatpak-remote:
    name: Publish Flatpak remote
    needs: [flatpak]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Flatpak bundles
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build combined Flatpak repository
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq flatpak
          mkdir -p combined-repo site/flatpak
          X86_BUNDLE="$(find artifacts/flatpak-x86_64 -name '*.flatpak' | head -1)"
          A64_BUNDLE="$(find artifacts/flatpak-aarch64 -name '*.flatpak' | head -1)"
          test -n "$X86_BUNDLE" || { echo "Missing x86_64 flatpak bundle" >&2; exit 1; }
          test -n "$A64_BUNDLE" || { echo "Missing aarch64 flatpak bundle" >&2; exit 1; }
          flatpak build-import-bundle combined-repo "$X86_BUNDLE"
          flatpak build-import-bundle combined-repo "$A64_BUNDLE"
          flatpak build-update-repo combined-repo --generate-static-deltas
          cp -a combined-repo/. site/flatpak/
          cat > site/flatpak/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="utf-8"><title>Xonotic Touch Flatpak remote</title></head>
          <body>
          <h1>Xonotic Touch Flatpak remote</h1>
          <pre>
          flatpak remote-add --user --if-not-exists xonotic-touch \
            https://dixonSolutions.github.io/Xonotic-Ubuntu-Touch-App/flatpak
          flatpak install --user xonotic-touch io.github.dixonSolutions.XonoticTouch
          </pre>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [flatpak, click-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/flatpak-x86_64/*.flatpak
            release/flatpak-aarch64/*.flatpak
            release/click-arm64/*.click
          generate_release_notes: true
