name: Build and publish

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FLATPAK_APP_ID: io.github.dixonSolutions.XonoticTouch
  FLATPAK_REMOTE_NAME: xonotic-touch
  FLATPAK_REMOTE_URL: https://dixonSolutions.github.io/Xonotic-Touch/flatpak

jobs:
  flatpak:
    name: Flatpak (${{ matrix.arch }})
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Docker for QEMU
        if: matrix.arch != 'x86_64'
        run: |
          curl -fsSL https://download.docker.com/linux/static/stable/x86_64/docker-26.0.0.tgz \
            --output ./docker.tgz
          tar xzf docker.tgz
          mv docker/* /usr/bin

      - name: Set up QEMU
        if: matrix.arch != 'x86_64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: XonoticTouch-${{ matrix.arch }}.flatpak
          manifest-path: flatpak/io.github.dixonSolutions.XonoticTouch.yml
          arch: ${{ matrix.arch }}
          keep-build-dirs: true
          cache-key: xonotic-touch-${{ matrix.arch }}-v1-${{ hashFiles('flatpak/io.github.dixonSolutions.XonoticTouch.yml', 'scripts/**', 'packaging/**', 'touch/**', 'engine/darkplaces/makefile.inc') }}
          restore-cache: true

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-${{ matrix.arch }}
          path: XonoticTouch-${{ matrix.arch }}.flatpak

  publish-flatpak-remote:
    name: Publish Flatpak remote
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: [flatpak]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Flatpak bundles
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build combined Flatpak repository
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq flatpak ostree
          mkdir -p combined-repo site/flatpak
          X86_BUNDLE="$(find artifacts/flatpak-x86_64 -name '*.flatpak' | head -1)"
          A64_BUNDLE="$(find artifacts/flatpak-aarch64 -name '*.flatpak' | head -1)"
          test -n "$X86_BUNDLE" || { echo "Missing x86_64 flatpak bundle" >&2; exit 1; }
          test -n "$A64_BUNDLE" || { echo "Missing aarch64 flatpak bundle" >&2; exit 1; }
          ostree init --repo=combined-repo --mode=archive-z2
          flatpak build-import-bundle combined-repo "$X86_BUNDLE"
          flatpak build-import-bundle combined-repo "$A64_BUNDLE"
          flatpak build-update-repo combined-repo --generate-static-deltas
          cp -a combined-repo/. site/flatpak/
          cat > site/flatpak/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="utf-8"><title>Xonotic Touch Flatpak remote</title></head>
          <body>
          <h1>Xonotic Touch Flatpak remote</h1>
          <pre>
          flatpak remote-add --user --if-not-exists xonotic-touch \
            https://dixonSolutions.github.io/Xonotic-Touch/flatpak
          flatpak install --user xonotic-touch io.github.dixonSolutions.XonoticTouch
          </pre>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: GitHub Release
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: [flatpak]
    runs-on: ubuntu-latest
    steps:
      - name: Download Flatpak bundles
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Prepare release files
        run: |
          mkdir -p release/upload
          cp release/flatpak-x86_64/*.flatpak release/upload/
          cp release/flatpak-aarch64/*.flatpak release/upload/
          ls -la release/upload/

      - name: Remove previous continuous release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete continuous --yes 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Xonotic Touch (latest)
          files: release/upload/*
          generate_release_notes: true
          make_latest: true
